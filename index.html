<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom TPS Timer</title>
  <style>
    /* Focus on High-Contrast and Scalability */
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --accent: #4ca9ff;
      --card-bg: #f0f4f8;
    }

    body, html {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #eef2f3;
      overflow: hidden; /* Prevents accidental scrolling on boards */
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Top Section: Progress Cards */
    .header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .stage-card {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 4px solid transparent;
      transition: 0.3s;
    }

    .stage-card.active {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transform: scale(1.05);
    }

    .stage-label { font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }

    /* Middle Section: THE BIG TIMER */
    .timer-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: white;
      border-radius: 20px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    }

    #stagePrompt {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 10px;
    }

    #digitalTimer {
      font-size: clamp(8rem, 25vh, 15rem); /* Massive font for classroom visibility */
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* Bottom Section: Controls */
    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 15px 25px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #444;
      color: white;
      transition: background 0.2s;
    }

    button#startBtn { background: #28a745; width: 150px; }
    button:hover { filter: brightness(1.2); }
    .btn-secondary { background: #6c757d; }

  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="stage-card" id="card-0">
      <div class="stage-label">Think</div>
      <div id="time-0">30s</div>
    </div>
    <div class="stage-card" id="card-1">
      <div class="stage-label">Pair</div>
      <div id="time-1">60s</div>
    </div>
    <div class="stage-card" id="card-2">
      <div class="stage-label">Share</div>
      <div id="time-2">45s</div>
    </div>
  </div>

  <div class="timer-area">
    <div id="stagePrompt">Ready to Start</div>
    <div id="digitalTimer">00:00</div>
  </div>

  <div class="controls">
    <button onclick="setPreset('quick')" class="btn-secondary">Quick</button>
    <button onclick="setPreset('standard')" class="btn-secondary">Standard</button>
    <button onclick="setPreset('extended')" class="btn-secondary">Extended</button>
    <button id="startBtn" onclick="toggleTimer()">START</button>
    <button onclick="resetTimer()" class="btn-secondary">RESET</button>
  </div>
</div>

<script>
  const CONFIG = {
    quick: [20, 40, 30],
    standard: [30, 60, 45],
    extended: [45, 90, 60]
  };
  
  const LABELS = ["Think", "Pair", "Share"];
  let currentDurations = [...CONFIG.standard];
  let stageIdx = 0;
  let timeLeft = currentDurations[0];
  let timerId = null;
  let audioCtx = null;

  function updateUI() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('digitalTimer').textContent = 
      `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    
    document.querySelectorAll('.stage-card').forEach((c, i) => {
      c.classList.toggle('active', i === stageIdx);
      document.getElementById(`time-${i}`).textContent = currentDurations[i] + 's';
    });

    document.getElementById('stagePrompt').textContent = timerId ? LABELS[stageIdx] : "Paused/Ready";
  }

  function setPreset(p) {
    stopTimer();
    currentDurations = [...CONFIG[p]];
    resetTimer();
  }

  function toggleTimer() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (timerId) {
      stopTimer();
    } else {
      document.getElementById('startBtn').textContent = "PAUSE";
      timerId = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateUI();
        } else {
          nextStage();
        }
      }, 1000);
    }
  }

  function stopTimer() {
    clearInterval(timerId);
    timerId = null;
    document.getElementById('startBtn').textContent = "START";
    updateUI();
  }

  function nextStage() {
    if (stageIdx < 2) {
      stageIdx++;
      timeLeft = currentDurations[stageIdx];
      beep(600, 0.5);
      updateUI();
    } else {
      stopTimer();
      beep(800, 1.5);
      document.getElementById('stagePrompt').textContent = "Finished!";
    }
  }

  function resetTimer() {
    stopTimer();
    stageIdx = 0;
    timeLeft = currentDurations[0];
    updateUI();
  }

  function beep(freq, dur) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  }

  updateUI();
</script>
</body>
</html>
